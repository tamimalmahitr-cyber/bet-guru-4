{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="balance-card mb-4" style="background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); padding: 24px; border-radius: 15px; text-align: center;">
            <h5 class="mb-1">Your Balance</h5>
            <h1 class="fw-bold">${{ balance }}</h1>
            <p class="mb-0 opacity-75">{{ session['user'] }}</p>
        </div>

        <div class="card p-4">
            <h5 class="mb-3">💸 Submit Deposit / Withdraw Request</h5>
            <p class="text-muted small">Requests are reviewed by admin before processing.</p>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Request Type</label>
                    <select name="type" class="form-control form-select">
                        <option value="deposit">Deposit</option>
                        <option value="withdraw">Withdraw</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Amount ($)</label>
                    <input type="number" name="amount" class="form-control" min="1" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Submit Request</button>
            </form>
        </div>

        <div class="mt-3 text-center">
            <a href="/history" class="btn btn-outline-secondary me-2">Transaction History</a>
            <a href="/games" class="btn btn-warning">🎮 Play Games</a>
        </div>
    </div>
</div>
{% endblock %}
